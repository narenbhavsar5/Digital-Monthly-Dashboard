version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bench_wise_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bench_wise_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=bench_wise
      - CORS_ORIGINS=http://localhost,http://localhost:5173,http://localhost:80
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # We assume the user runs the browser on their local machine, 
        # so we point the React frontend to localhost backend for API access
        - VITE_GRAPHQL_URL=http://localhost:8000/graphql
    container_name: bench_wise_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
